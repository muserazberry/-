<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:," />
  <title>경기도 조례 제·개정 추천</title>
  <style>
    body { font-family: -apple-system, "Malgun Gothic", sans-serif; margin: 0; background: #f5f6f8; color: #1c2128; font-size: 16px; }
    header { background: #0b3d91; color: #fff; padding: 18px 24px; }
    header h1 { margin: 0; font-size: 24px; }
    header p { margin: 4px 0 0; font-size: 16px; opacity: .85; }
    .toolbar { padding: 14px 24px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; background: #fff; border-bottom: 1px solid #e1e4e8; }
    .toolbar label { font-size: 16px; }
    button { background: #0b3d91; color: #fff; border: 0; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 16px; }
    button:disabled { opacity: .5; cursor: default; }
    .stats { padding: 0 24px 12px; font-size: 16px; color: #444; }
    .stats b { color: #0b3d91; }
    .overview { padding: 16px 24px 4px; }
    .overview h2 { margin: 0 0 10px; font-size: 18px; color: #1c2128; }
    .stats-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .stat-card { background: #fff; border: 1px solid #e1e4e8; border-radius: 8px; padding: 14px 18px; flex: 1; min-width: 120px; }
    .stat-card .num { font-size: 34px; font-weight: 800; color: #0b3d91; line-height: 1.1; }
    .stat-card .lbl { font-size: 15px; color: #5a6b7b; margin-top: 4px; }
    table { width: calc(100% - 48px); margin: 0 24px 32px; border-collapse: collapse; background: #fff; font-size: 15px; }
    th, td { text-align: left; padding: 12px 14px; border-bottom: 1px solid #eef0f2; vertical-align: top; }
    th { background: #f0f2f5; position: sticky; top: 0; }
    .gap { color: #c0392b; font-weight: 600; }
    .weak { color: #b9770e; font-weight: 600; }
    .ref { color: #5a6b7b; font-weight: 600; }
    .ok { color: #2e7d32; }
    .score { color: #555; font-size: 14px; }
    .tag { display: inline-block; background: #eef; border-radius: 4px; padding: 2px 8px; margin: 1px 2px; font-size: 14px; }
    a { color: #0b3d91; }
    .msg { padding: 24px; color: #c0392b; }
    .draft-btn { display: inline-block; margin-top: 8px; background: #0b3d91; color: #fff; border: 0; border-radius: 5px; padding: 5px 12px; font-size: 14px; cursor: pointer; }
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: none; align-items: center; justify-content: center; z-index: 50; }
    .modal.show { display: flex; }
    .modal-box { background: #fff; width: min(820px, 94vw); max-height: 88vh; border-radius: 10px; padding: 18px 22px; display: flex; flex-direction: column; box-shadow: 0 8px 30px rgba(0,0,0,.25); }
    .modal-box h3 { margin: 0 0 4px; font-size: 18px; color: #0b3d91; }
    .modal-box .sub { font-size: 13px; color: #b9770e; margin-bottom: 10px; }
    .modal-box textarea { flex: 1; min-height: 400px; width: 100%; box-sizing: border-box; font-family: Consolas, "D2Coding", monospace; font-size: 14px; line-height: 1.6; border: 1px solid #d0d7de; border-radius: 6px; padding: 12px; resize: vertical; }
    .modal-actions { margin-top: 12px; display: flex; gap: 8px; justify-content: flex-end; }
    .btn-ghost { background: #eef0f2; color: #1c2128; padding: 8px 16px; font-size: 14px; }
  </style>
</head>
<body>
  <header>
    <h1>경기도 조례 제·개정 추천 시스템</h1>
    <p>정책·입법 신호 → 경기도 조례 미반영 갭 탐지</p>
  </header>

  <div class="toolbar">
    <label>출처 <select id="source"></select></label>
    <label id="lblAge">국회 대수 <input id="age" type="text" value="22" size="4" /></label>
    <label>표본 수 <input id="sample" type="number" value="15" min="1" max="100" /></label>
    <label id="lblPassed"><input id="onlyPassed" type="checkbox" checked /> 통과 법률안만</label>
    <label id="lblDeleg"><input id="withDeleg" type="checkbox" checked /> 위임조항 분석</label>
    <label><input id="onlyGap" type="checkbox" /> 추천만(제정·개정)</label>
    <label id="lblStrong"><input id="onlyStrong" type="checkbox" /> 고신뢰(위임○)만</label>
    <button id="run">분석 실행</button>
  </div>

  <div class="overview" id="overview" style="display:none">
    <h2>📊 전체 현황</h2>
    <div class="stats-row" id="statsRow"></div>
  </div>
  <div class="stats" id="stats"></div>
  <div id="result"></div>

  <div class="modal" id="draftModal">
    <div class="modal-box">
      <h3 id="draftTitle">조례안 초안</h3>
      <div class="sub">⚠ 자동 생성된 서식 골격입니다. [   ]·○○ 부분을 검토·작성하세요.</div>
      <textarea id="draftText" spellcheck="false"></textarea>
      <div class="modal-actions">
        <button class="btn-ghost" id="draftCopy">복사</button>
        <button class="btn-ghost" id="draftClose">닫기</button>
      </div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    let lastData = null;
    let shownRows = [];   // 현재 화면에 표시 중인 후보 (초안 버튼이 인덱스로 참조)

    async function loadSources() {
      try {
        const list = await (await fetch("/api/sources")).json();
        $("source").innerHTML = list
          .map((s) => `<option value="${s.key}">${s.label}</option>`).join("");
      } catch (e) { /* 무시: 기본 출처 사용 */ }
      updateControls();
    }

    // 선택한 출처에 해당하는 컨트롤만 노출 (국회 전용 옵션은 다른 출처에서 숨김)
    function updateControls() {
      const src = $("source").value;
      const isAssembly = src === "assembly";
      const usesDeleg = src === "assembly" || src === "lawmaking";  // 법령 본문 분석 출처
      $("lblAge").style.display = isAssembly ? "" : "none";
      $("lblPassed").style.display = isAssembly ? "" : "none";
      $("lblDeleg").style.display = usesDeleg ? "" : "none";
      $("lblStrong").style.display = usesDeleg ? "" : "none";
    }

    async function run() {
      const btn = $("run");
      btn.disabled = true; btn.textContent = "분석 중…";
      $("result").innerHTML = ""; $("stats").innerHTML = ""; $("overview").style.display = "none";
      const qs = new URLSearchParams({
        source: $("source").value || "assembly",
        age: $("age").value.trim(),
        sample: $("sample").value,
        only_passed: $("onlyPassed").checked,
        with_delegation: $("withDeleg").checked,
      });
      try {
        const res = await fetch("/api/analyze?" + qs);
        if (!res.ok) throw new Error((await res.json()).detail || res.statusText);
        lastData = await res.json();
        render();
      } catch (e) {
        $("result").innerHTML = '<div class="msg">오류: ' + e.message + "</div>";
      } finally {
        btn.disabled = false; btn.textContent = "분석 실행";
      }
    }

    function render() {
      if (!lastData) return;
      const onlyRec = $("onlyGap").checked, onlyStrong = $("onlyStrong").checked;
      const isRec = (c) => c.action === "enact" || c.action === "amend";
      const rows = lastData.candidates.filter((c) =>
        (!onlyRec || isRec(c)) && (!onlyStrong || c.strong));
      shownRows = rows;
      const enact = lastData.enact_count ?? 0, amend = lastData.amend_count ?? 0;
      const strong = lastData.strong_gap_count || 0, ref = lastData.reference_count || 0;
      // 전체 현황 통계 카드 (실제 분석 데이터 기반)
      const card = (num, lbl, color) =>
        `<div class="stat-card"><div class="num"${color ? ` style="color:${color}"` : ""}>${num}</div><div class="lbl">${lbl}</div></div>`;
      $("statsRow").innerHTML =
        card(enact + amend, "총 추천 (제정+개정)") +
        card(enact, "제정 추천", "#c0392b") +
        card(amend, "개정 추천", "#b9770e") +
        card(strong, "고신뢰 (위임조항○)", "#2e7d32") +
        card(ref, "참고 (관련 조례 후보)", "#5a6b7b");
      $("overview").style.display = "";
      $("stats").innerHTML =
        `출처 <b>${lastData.source_label || ""}</b> · 검토 신호 <b>${lastData.total_scanned}</b>건` +
        ` · 현재 표시 <b>${rows.length}</b>건`;
      if (!rows.length) { $("result").innerHTML = '<div class="msg">표시할 항목이 없습니다.</div>'; return; }
      // 권고 유형 라벨 (자치사무 필터 반영): 제정 / 개정 / 국가사무·제외 / 반영
      const actionLabel = (c) => {
        if (c.reference_only) return '<span class="ref">참고 (관련 조례 후보)</span>';
        if (c.action === "enact") return '<span class="gap">제정 추천</span>';
        if (c.action === "amend") return '<span class="weak">개정 추천</span>';
        if (c.level === "gap") return '<span class="ref">국가사무·타지역 (제외)</span>';
        return '<span class="ok">이미 반영됨</span>';
      };
      const esc = (s) => (s || "").replace(/</g, "&lt;");
      const body = rows.map((c, i) => {
        const s = c.signal;
        const meta = Object.entries(s.meta || {})
          .filter(([, v]) => v).map(([k, v]) => `${k}: ${esc(v)}`).join(" · ");
        const link = s.link ? `<a href="${esc(s.link)}" target="_blank">원문</a>` : "";
        const badge = c.strong ? '<span class="gap"> ⚖위임조항</span>'
          : (c.has_delegation === false ? '<span class="score"> (위임 없음)</span>' : "");
        const snip = (s.delegation_snippets || [])[0]
          ? `<br><small class="score">근거: …${esc(s.delegation_snippets[0])}…</small>` : "";
        const ords = c.matched_ordinances
          .map((o) => {
            const mark = o.linked ? " 🔗연계"
              : (o.key_match ? " ✓핵심어" : (o.hits ? " ·부분" : ""));
            return `<span class="tag">${esc(o.name)}<span class="score">${mark} (${o.score})</span></span>`;
          })
          .join(" ") || "—";
        const levelLabel = actionLabel(c) + (c.reference_only ? "" : badge);
        const draftBtn = isRec(c)
          ? `<br><button class="draft-btn" data-i="${i}">📄 조례안 초안</button>` : "";
        return `<tr>
          <td>${levelLabel}<br><span class="score">최고 유사도 ${c.best_score}</span>${draftBtn}</td>
          <td><span class="score">[${esc(s.source)}]</span> ${esc(s.title)}<br><small>${meta} ${s.date || ""} ${link}</small>${snip}</td>
          <td>${(c.search_terms || []).join(", ")}</td>
          <td>${ords}</td>
        </tr>`;
      }).join("");
      $("result").innerHTML =
        `<table><thead><tr><th>판정</th><th>신호 (출처·제목)</th><th>검색어</th><th>경기도 관련 조례 (유사도)</th></tr></thead><tbody>${body}</tbody></table>`;
    }

    // ── 조례안 초안(서식 골격) 생성: 후보에 이미 있는 데이터만으로 클라이언트에서 작성 ──
    // 가장 관련도 높은 조례명을 고른다 (연계 > 핵심어 > 부분일치 > 첫 후보).
    function mainOrdinance(c) {
      const ords = c.matched_ordinances || [];
      if (!ords.length) return "";
      const pick = ords.find((o) => o.linked) || ords.find((o) => o.key_match)
        || ords.find((o) => o.hits) || ords[0];
      return pick ? pick.name : "";
    }

    // action(enact=제정 / amend=개정)에 따라 표준 조례안 서식 골격을 문자열로 만든다.
    function buildDraft(c) {
      const s = c.signal;
      const today = new Date().toISOString().slice(0, 10);
      const terms = (c.search_terms || []).join(", ") || "—";
      const head =
        `※ 자동 생성 서식 골격 — [   ]·○○ 부분을 검토·작성하세요.\n` +
        `─────────────────────────────────────\n` +
        `· 근거 신호 : [${s.source}] ${s.title}\n` +
        `· 핵심어    : ${terms}\n` +
        `· 생성일    : ${today}\n` +
        `─────────────────────────────────────\n\n`;

      if (c.action === "amend") {
        const target = mainOrdinance(c) || "○○○○ 조례";
        const title = `경기도 ${target} 일부개정조례안`;
        const text = head +
          `${title}\n\n` +
          `경기도 ${target} 일부를 다음과 같이 개정한다.\n\n` +
          `제○조제○항 중 "[기존 문구]"를 "[개정 문구]"로 한다.\n` +
          `제○조에 다음 각 호를 신설한다.\n` +
          `  1. [신설 내용]\n` +
          `  2. [신설 내용]\n\n` +
          `■ 신·구조문대비표\n` +
          `┌────────────────┬────────────────┐\n` +
          `│ 현       행    │ 개   정   안   │\n` +
          `├────────────────┼────────────────┤\n` +
          `│ [기존 조문]    │ [개정 조문]    │\n` +
          `└────────────────┴────────────────┘\n\n` +
          `■ 제안이유\n` +
          `  ${s.title}에 따라 ${terms} 관련 사항을 경기도 조례에 반영하기 위함.\n\n` +
          `■ 주요내용\n` +
          `  가. [개정 주요내용 1]\n` +
          `  나. [개정 주요내용 2]\n\n` +
          `   부      칙\n` +
          `이 조례는 공포한 날부터 시행한다.\n`;
        return { title, text };
      }

      // 제정안 (enact)
      const subject = (c.search_terms || [])[0] || "○○ 지원";
      const title = `경기도 ${subject}에 관한 조례안`;
      const text = head +
        `${title}\n\n` +
        `제1조(목적) 이 조례는 ${subject}에 필요한 사항을 규정하여 [정책 목적]에 ` +
        `이바지함을 목적으로 한다.\n\n` +
        `제2조(정의) 이 조례에서 사용하는 용어의 뜻은 다음과 같다.\n` +
        `  1. "[용어]"란 [정의]를 말한다.\n\n` +
        `제3조(도지사의 책무) 경기도지사는 ${subject}을(를) 위한 시책을 ` +
        `수립·시행하여야 한다.\n\n` +
        `제4조(사업) ① 도지사는 다음 각 호의 사업을 추진할 수 있다.\n` +
        `  1. [사업 1]\n` +
        `  2. [사업 2]\n` +
        `  ② 도지사는 제1항의 사업에 필요한 예산을 지원할 수 있다.\n\n` +
        `제5조(시행규칙) 이 조례의 시행에 필요한 사항은 규칙으로 정한다.\n\n` +
        `■ 제안이유\n` +
        `  ${s.title} 등 정책 동향에 대응하여 ${subject} 근거를 마련하기 위함.\n\n` +
        `   부      칙\n` +
        `이 조례는 공포한 날부터 시행한다.\n`;
      return { title, text };
    }

    function openDraft(i) {
      const c = shownRows[i];
      if (!c) return;
      const d = buildDraft(c);
      $("draftTitle").textContent = d.title;
      $("draftText").value = d.text;
      $("draftModal").classList.add("show");
    }
    const closeDraft = () => $("draftModal").classList.remove("show");

    $("run").addEventListener("click", run);
    $("source").addEventListener("change", updateControls);
    $("onlyGap").addEventListener("change", render);
    $("onlyStrong").addEventListener("change", render);
    $("result").addEventListener("click", (e) => {
      const btn = e.target.closest(".draft-btn");
      if (btn) openDraft(+btn.dataset.i);
    });
    $("draftClose").addEventListener("click", closeDraft);
    $("draftModal").addEventListener("click", (e) => {
      if (e.target === $("draftModal")) closeDraft();
    });
    $("draftCopy").addEventListener("click", () => {
      navigator.clipboard.writeText($("draftText").value);
      $("draftCopy").textContent = "복사됨 ✓";
      setTimeout(() => ($("draftCopy").textContent = "복사"), 1500);
    });
    loadSources();
  </script>
</body>
</html>
